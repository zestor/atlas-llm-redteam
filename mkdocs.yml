      - Phantom RAG Poisoning: wiki/04_research_to_code/phantom-rag-poisoning.md
      - PAIR Jailbreak: wiki/04_research_to_code/pair-jailbreak.md
      - TAP Attack: wiki/04_research_to_code/tap-attack.md
