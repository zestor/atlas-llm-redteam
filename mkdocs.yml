          - XTHP Attack: wiki/02_attack_techniques/agent-attacks/xthp-attack.md
          - MAS Hijacking: wiki/02_attack_techniques/agent-attacks/mas-hijacking.md
          - Tool Poisoning: wiki/02_attack_techniques/agent-attacks/tool-poisoning.md
  - Defenses:
